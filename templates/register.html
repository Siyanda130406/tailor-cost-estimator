<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Tailor Cost Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M20 4L4 20"/>
                    <path d="M20 4c0 0-2 0-4 2L4 18l2 2L18 8c2-2 2-4 2-4z"/>
                    <circle cx="4.5" cy="19.5" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
            </div>
        </div>
        <h1 class="auth-title">Create Account</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="auth-field-row">
                <div class="auth-field">
                    <input type="text" name="first_name" placeholder="First name" required>
                </div>
                <div class="auth-field">
                    <input type="text" name="last_name" placeholder="Last name" required>
                </div>
            </div>
            <div class="auth-field">
                <input type="email" name="email" placeholder="Email address" required>
            </div>
            <div class="auth-field">
                <input type="password" name="password" placeholder="Create password" required>
            </div>
            <div class="auth-field">
                <input type="password" name="confirm_password" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
            <div class="auth-links" style="justify-content:center;margin-top:12px">
                <a href="{{ url_for('login') }}">Already have an account? Log in</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
